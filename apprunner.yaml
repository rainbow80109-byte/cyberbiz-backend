version: 1.0
runtime: nodejs22

build:
  commands:
    pre-build:
      - npm ci --omit=dev

run:
  runtime-version: 22.14.0
  command: npm start
  network:
    port: 3000
  env:
    - name: NODE_ENV
      value: production
    - name: DATA_DIR
      value: /tmp/data
    - name: UPLOAD_DIR
      value: /tmp/uploads
